<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LHXLIV">
    <meta name="theme-color" content="#111111">
    <title>LHXLIV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
            background-color: #111111;
            color: #dddddd;
            min-height: 100vh;
            padding: 25px 15px;
            padding-top: max(25px, env(safe-area-inset-top));
            padding-bottom: max(25px, env(safe-area-inset-bottom));
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #2a2a2a;
        }

        .mission-id {
            font-family: 'Courier New', Courier, monospace;
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 5px;
            margin-bottom: 5px;
        }

        .mission-subtitle {
            font-size: 11px;
            color: #777777;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .matrix-section {
            background-color: #1a1a1a;
            border: 1px solid #2a2a2a;
            padding: 20px 15px;
        }

        .section-header {
            display: -webkit-box;
            display: flex;
            -webkit-box-pack: justify;
            justify-content: space-between;
            -webkit-box-align: center;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #2a2a2a;
        }

        .section-title {
            font-family: 'Courier New', Courier, monospace;
            font-size: 10px;
            color: #777777;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .current-date {
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            color: #999999;
        }

        .dot-matrix {
            display: -webkit-box;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            justify-content: center;
            margin-bottom: 20px;
            max-width: 232px;
            margin-left: auto;
            margin-right: auto;
        }

        .dot {
            width: 12px;
            height: 12px;
            background-color: #2a2a2a;
        }

        .dot-filled {
            background-color: #ffffff;
        }

        .dot-today {
            background-color: #999999;
            outline: 2px solid #ffffff;
            outline-offset: 1px;
        }

        .dot-amara {
            background-color: #ff6b8a;
        }

        .dot-diego {
            background-color: #7ec8e3;
        }

        .dot-redacted {
            background-color: #3a3a3a;
            position: relative;
        }

        .dot-redacted::before {
            content: '';
            position: absolute;
            width: 2px;
            height: 140%;
            background-color: #cc3333;
            top: 50%;
            left: 50%;
            -webkit-transform: translate(-50%, -50%) rotate(45deg);
            transform: translate(-50%, -50%) rotate(45deg);
        }

        .dot-redacted::after {
            content: '';
            position: absolute;
            width: 2px;
            height: 140%;
            background-color: #cc3333;
            top: 50%;
            left: 50%;
            -webkit-transform: translate(-50%, -50%) rotate(-45deg);
            transform: translate(-50%, -50%) rotate(-45deg);
        }

        .legend {
            display: -webkit-box;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding-top: 15px;
            border-top: 1px solid #2a2a2a;
        }

        .legend-item {
            display: -webkit-box;
            display: flex;
            -webkit-box-align: center;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            color: #777777;
            text-transform: uppercase;
            width: 45%;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            -webkit-flex-shrink: 0;
            flex-shrink: 0;
        }

        .legend-dot-empty {
            background-color: #2a2a2a;
        }

        .legend-dot-filled {
            background-color: #ffffff;
        }

        .legend-dot-today {
            background-color: #999999;
            outline: 2px solid #ffffff;
            outline-offset: 1px;
        }

        .legend-dot-amara {
            background-color: #ff6b8a;
        }

        .legend-dot-diego {
            background-color: #7ec8e3;
        }

        .legend-dot-redacted {
            background-color: #3a3a3a;
            position: relative;
        }

        .legend-dot-redacted::before {
            content: '';
            position: absolute;
            width: 2px;
            height: 140%;
            background-color: #cc3333;
            top: 50%;
            left: 50%;
            -webkit-transform: translate(-50%, -50%) rotate(45deg);
            transform: translate(-50%, -50%) rotate(45deg);
        }

        .legend-dot-redacted::after {
            content: '';
            position: absolute;
            width: 2px;
            height: 140%;
            background-color: #cc3333;
            top: 50%;
            left: 50%;
            -webkit-transform: translate(-50%, -50%) rotate(-45deg);
            transform: translate(-50%, -50%) rotate(-45deg);
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
            font-size: 10px;
            color: #555555;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="mission-id">LHXLIV</h1>
            <p class="mission-subtitle">Libre Hidalgo XLIV</p>
        </header>

        <section class="matrix-section">
            <div class="section-header">
                <span class="section-title">Registro de misión</span>
                <span class="current-date" id="currentDate"></span>
            </div>
            
            <div class="dot-matrix" id="dotMatrix"></div>
            
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-dot legend-dot-filled"></div>
                    <span>Completado</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot legend-dot-today"></div>
                    <span>Hoy</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot legend-dot-empty"></div>
                    <span>Pendiente</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot legend-dot-amara"></div>
                    <span>Amara ♡</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot legend-dot-diego"></div>
                    <span>Diego</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot legend-dot-redacted"></div>
                    <span>Clasificado</span>
                </div>
            </div>
        </section>

        <footer class="footer">
            NOV 2025 — MAY 2026
        </footer>
    </div>

    <script>
        (function() {
            var START = new Date(2025, 10, 20);
            var TOTAL = 196;
            
            var REDACTED_START = new Date(2026, 4, 19);
            var REDACTED_END = new Date(2026, 4, 27);
            var AMARA = new Date(2026, 3, 27);
            var DIEGO = new Date(2026, 4, 26);
            
            var today = new Date();
            today.setHours(0, 0, 0, 0);

            function sameDay(a, b) {
                return a.getDate() === b.getDate() && 
                       a.getMonth() === b.getMonth() && 
                       a.getFullYear() === b.getFullYear();
            }

            function inRange(d, start, end) {
                return d >= start && d <= end;
            }

            function formatDate(d) {
                var day = d.getDate();
                var month = d.getMonth() + 1;
                var year = d.getFullYear();
                if (day < 10) day = '0' + day;
                if (month < 10) month = '0' + month;
                return day + '/' + month + '/' + year;
            }

            document.getElementById('currentDate').textContent = formatDate(today);

            var matrix = document.getElementById('dotMatrix');
            var html = '';

            for (var i = 0; i < TOTAL; i++) {
                var d = new Date(START.getTime());
                d.setDate(d.getDate() + i);
                
                var cls = 'dot';
                
                if (sameDay(d, DIEGO)) {
                    cls = cls + ' dot-diego';
                } else if (inRange(d, REDACTED_START, REDACTED_END)) {
                    cls = cls + ' dot-redacted';
                } else if (sameDay(d, AMARA)) {
                    cls = cls + ' dot-amara';
                } else if (d < today) {
                    cls = cls + ' dot-filled';
                } else if (sameDay(d, today)) {
                    cls = cls + ' dot-today';
                }
                
                html = html + '<div class="' + cls + '"></div>';
            }

            matrix.innerHTML = html;
        })();
    </script>
</body>
</html>
