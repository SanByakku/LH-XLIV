<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LHXLIV">
    <meta name="theme-color" content="#111111">
    <title>LHXLIV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
            background-color: #111111;
            color: #dddddd;
            min-height: 100vh;
            padding: 25px 15px;
            padding-top: max(25px, env(safe-area-inset-top));
            padding-bottom: max(25px, env(safe-area-inset-bottom));
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #2a2a2a;
        }

        .mission-id {
            font-family: 'Courier New', Courier, monospace;
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 5px;
            margin-bottom: 5px;
        }

        .mission-subtitle {
            font-size: 11px;
            color: #777777;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .daily-quote {
            font-size: 12px;
            color: #999999;
            font-style: italic;
            padding-top: 12px;
            border-top: 1px solid #2a2a2a;
        }

        .matrix-section {
            background-color: #1a1a1a;
            border: 1px solid #2a2a2a;
            padding: 20px 15px;
        }

        .section-header {
            display: -webkit-box;
            display: flex;
            -webkit-box-pack: justify;
            justify-content: space-between;
            -webkit-box-align: center;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #2a2a2a;
        }

        .section-title {
            font-family: 'Courier New', Courier, monospace;
            font-size: 10px;
            color: #777777;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .current-date {
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            color: #999999;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background-color: #2a2a2a;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: #ffffff;
            -webkit-transition: width 0.3s;
            transition: width 0.3s;
        }

        .dot-matrix {
            display: -webkit-box;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            justify-content: center;
            margin-bottom: 20px;
            max-width: 232px;
            margin-left: auto;
            margin-right: auto;
        }

        .dot {
            width: 12px;
            height: 12px;
            background-color: #2a2a2a;
        }

        .dot-filled {
            background-color: #ffffff;
        }

        .dot-today {
            background-color: #999999;
            outline: 2px solid #ffffff;
            outline-offset: 1px;
        }

        .dot-amara {
            background-color: #ff6b8a;
        }

        .dot-diego {
            background-color: #7ec8e3;
        }

        .dot-festivo {
            outline: 2px solid #ffffff;
            outline-offset: -1px;
        }

        .dot-festivo-filled {
            background-color: #ffffff;
            outline: 2px solid #777777;
            outline-offset: -1px;
        }

        .dot-redacted {
            background-color: #3a3a3a;
            position: relative;
        }

        .dot-redacted::before {
            content: '';
            position: absolute;
            width: 2px;
            height: 140%;
            background-color: #cc3333;
            top: 50%;
            left: 50%;
            -webkit-transform: translate(-50%, -50%) rotate(45deg);
            transform: translate(-50%, -50%) rotate(45deg);
        }

        .dot-redacted::after {
            content: '';
            position: absolute;
            width: 2px;
            height: 140%;
            background-color: #cc3333;
            top: 50%;
            left: 50%;
            -webkit-transform: translate(-50%, -50%) rotate(-45deg);
            transform: translate(-50%, -50%) rotate(-45deg);
        }

        .stats {
            display: -webkit-box;
            display: flex;
            -webkit-box-pack: center;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
            padding: 15px 0;
            border-top: 1px solid #2a2a2a;
            border-bottom: 1px solid #2a2a2a;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-family: 'Courier New', Courier, monospace;
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
        }

        .stat-label {
            font-size: 9px;
            color: #777777;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        .motivation {
            text-align: center;
            padding: 15px;
            margin-bottom: 20px;
            background-color: #1f1f1f;
            border-left: 3px solid #ffffff;
        }

        .motivation-text {
            font-size: 13px;
            color: #cccccc;
            font-style: italic;
        }

        .legend {
            display: -webkit-box;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding-top: 15px;
        }

        .legend-item {
            display: -webkit-box;
            display: flex;
            -webkit-box-align: center;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            color: #777777;
            text-transform: uppercase;
            width: 45%;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            -webkit-flex-shrink: 0;
            flex-shrink: 0;
        }

        .legend-dot-empty {
            background-color: #2a2a2a;
        }

        .legend-dot-filled {
            background-color: #ffffff;
        }

        .legend-dot-today {
            background-color: #999999;
            outline: 2px solid #ffffff;
            outline-offset: 1px;
        }

        .legend-dot-amara {
            background-color: #ff6b8a;
        }

        .legend-dot-diego {
            background-color: #7ec8e3;
        }

        .legend-dot-festivo {
            background-color: #2a2a2a;
            outline: 2px solid #ffffff;
            outline-offset: -1px;
        }

        .legend-dot-redacted {
            background-color: #3a3a3a;
            position: relative;
        }

        .legend-dot-redacted::before {
            content: '';
            position: absolute;
            width: 2px;
            height: 140%;
            background-color: #cc3333;
            top: 50%;
            left: 50%;
            -webkit-transform: translate(-50%, -50%) rotate(45deg);
            transform: translate(-50%, -50%) rotate(45deg);
        }

        .legend-dot-redacted::after {
            content: '';
            position: absolute;
            width: 2px;
            height: 140%;
            background-color: #cc3333;
            top: 50%;
            left: 50%;
            -webkit-transform: translate(-50%, -50%) rotate(-45deg);
            transform: translate(-50%, -50%) rotate(-45deg);
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
            font-size: 10px;
            color: #555555;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="mission-id">LHXLIV</h1>
            <p class="mission-subtitle">Libre Hidalgo XLIV</p>
            <p class="daily-quote" id="dailyQuote"></p>
        </header>

        <section class="matrix-section">
            <div class="section-header">
                <span class="section-title">Registro de misión</span>
                <span class="current-date" id="currentDate"></span>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            
            <div class="dot-matrix" id="dotMatrix"></div>

            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="statCompleted">--</div>
                    <div class="stat-label">Días en ZO</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="statPercent">--%</div>
                    <div class="stat-label">Progreso</div>
                </div>
            </div>

            <div class="motivation">
                <p class="motivation-text" id="motivationText"></p>
            </div>
            
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-dot legend-dot-filled"></div>
                    <span>Completado</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot legend-dot-today"></div>
                    <span>Hoy</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot legend-dot-festivo"></div>
                    <span>Festivo</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot legend-dot-amara"></div>
                    <span>Amara ♡</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot legend-dot-diego"></div>
                    <span>Diego</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot legend-dot-redacted"></div>
                    <span>Clasificado</span>
                </div>
            </div>
        </section>

        <footer class="footer">
            NOV 2025 — MAY 2026
        </footer>
    </div>

    <script>
        (function() {
            var START = new Date(2025, 10, 20);
            var TOTAL = 196;
            
            var REDACTED_START = new Date(2026, 4, 20);
            var REDACTED_END = new Date(2026, 4, 24);
            var AMARA = new Date(2026, 3, 27);
            var DIEGO = new Date(2026, 4, 26);
            
            var FESTIVOS = [
                new Date(2025, 11, 6),
                new Date(2025, 11, 8),
                new Date(2025, 11, 24),
                new Date(2025, 11, 25),
                new Date(2025, 11, 31),
                new Date(2026, 0, 1),
                new Date(2026, 0, 6),
                new Date(2026, 3, 2),
                new Date(2026, 3, 3),
                new Date(2026, 4, 1)
            ];

            var QUOTES = [
                '"Estar contigo es como estar solo"',
                '"Un corazón feliz es un corazón tranquilo"',
                '"Me das paz en esta guerra"'
            ];
            
            var today = new Date();
            today.setHours(0, 0, 0, 0);

            var dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / (1000 * 60 * 60 * 24));
            var quoteIndex = dayOfYear % 3;
            document.getElementById('dailyQuote').textContent = QUOTES[quoteIndex];

            function sameDay(a, b) {
                return a.getDate() === b.getDate() && 
                       a.getMonth() === b.getMonth() && 
                       a.getFullYear() === b.getFullYear();
            }

            function inRange(d, start, end) {
                return d >= start && d <= end;
            }

            function isFestivo(d) {
                for (var i = 0; i < FESTIVOS.length; i++) {
                    if (sameDay(d, FESTIVOS[i])) return true;
                }
                return false;
            }

            function formatDate(d) {
                var day = d.getDate();
                var month = d.getMonth() + 1;
                var year = d.getFullYear();
                if (day < 10) day = '0' + day;
                if (month < 10) month = '0' + month;
                return day + '/' + month + '/' + year;
            }

            function getMotivation(percent) {
                if (percent < 25) return 'El camino acaba de empezar. Cada día cuenta.';
                if (percent < 50) return 'Paso a paso, día a día. Ya queda menos.';
                if (percent < 75) return 'Más de la mitad. La cuenta atrás ha comenzado.';
                if (percent < 90) return 'Recta final. Pronto estaremos juntos.';
                return 'Ya casi está. Muy pronto.';
            }

            document.getElementById('currentDate').textContent = formatDate(today);

            var matrix = document.getElementById('dotMatrix');
            var html = '';
            var completed = 0;

            for (var i = 0; i < TOTAL; i++) {
                var d = new Date(START.getTime());
                d.setDate(d.getDate() + i);
                
                var cls = 'dot';
                var isPast = d < today;
                var isToday = sameDay(d, today);
                var festivo = isFestivo(d);
                
                if (sameDay(d, DIEGO)) {
                    cls = cls + ' dot-diego';
                    if (isPast || isToday) completed++;
                } else if (inRange(d, REDACTED_START, REDACTED_END)) {
                    cls = cls + ' dot-redacted';
                } else if (sameDay(d, AMARA)) {
                    cls = cls + ' dot-amara';
                    if (isPast || isToday) completed++;
                } else if (isToday) {
                    cls = cls + ' dot-today';
                    if (festivo) cls = cls + ' dot-festivo';
                    completed++;
                } else if (isPast) {
                    cls = cls + ' dot-filled';
                    if (festivo) cls = cls + ' dot-festivo-filled';
                    completed++;
                } else if (festivo) {
                    cls = cls + ' dot-festivo';
                }
                
                html = html + '<div class="' + cls + '"></div>';
            }

            matrix.innerHTML = html;

            var percent = Math.round((completed / TOTAL) * 100);

            document.getElementById('statCompleted').textContent = completed;
            document.getElementById('statPercent').textContent = percent + '%';
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('motivationText').textContent = getMotivation(percent);
        })();
    </script>
</body>
</html>
